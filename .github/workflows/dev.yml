name: Deploy LMS DEV

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/lms

            git pull origin main

            npm install

            cd client
            npm install
            npm run build

            cd ../server

            pm2 restart lms-dev --update-env
