name: lms-portal
region: blr

services:
  - name: api
    github:
      repo: rahuldv006/llms
      branch: main
      deploy_on_push: true
    source_dir: server
    environment_slug: node-js
    run_command: node server.js
    build_command: npm install
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /api
    envs:
      - key: NODE_ENV
        value: "production"
        scope: RUN_AND_BUILD_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: MONGO_URI
        value: "${MONGO_URI}"
        type: SECRET
        scope: RUN_TIME
      - key: JWT_SECRET
        value: "your_super_secret_jwt_key"
        type: SECRET
        scope: RUN_TIME
    health_check:
      http_path: /api/health

static_sites:
  - name: client
    github:
      repo: rahuldv006/llms
      branch: main
      deploy_on_push: true
    source_dir: client
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: index.html
    routes:
      - path: /
