name: Deploy to DEV

on:
  push:
    branches:
      - main   # ya dev branch bhi use kar sakte ho

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS DEV
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/lms   # 👈 DEV folder fixed

            git pull origin main

            npm install

            npm run build

            pm2 restart lms-dev
